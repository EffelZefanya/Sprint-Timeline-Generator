<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint Timeline Generator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./style.css?v=2">
</head>
<body>
    <div class="app-container">
        <header class="glass-panel header">
            <h1>Sprint Timeline Generator</h1>
            <p>Generate interactive timelines from CSV data</p>
        </header>

        <main class="main-content">
            <div class="glass-panel top-bar">
                <div class="config-section">
                    <h2>1. Sprint Dates</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="sprintStart">Start</label>
                            <input type="date" id="sprintStart">
                        </div>
                        <div class="form-group">
                            <label for="sprintEnd">End</label>
                            <input type="date" id="sprintEnd">
                        </div>
                    </div>
                </div>

                <div class="config-section">
                    <h2>2. Upload Data</h2>
                    <p class="helper-text">Accepts CSV or exported XLSX</p>
                    <div class="file-upload-wrapper">
                        <label for="csvUpload" class="btn-primary">
                            <span>Select File</span>
                        </label>
                        <input type="file" id="csvUpload" accept=".csv, .xlsx" />
                        <span id="fileNameDisplay" class="file-name">No file chosen</span>
                    </div>
                </div>
                
                <div class="config-section actions-section">
                    <h2>3. Export</h2>
                    <button id="exportBtn" class="btn-secondary" disabled>Export to Excel</button>
                </div>
            </div>

            <section class="glass-panel timeline-container">
                <div id="timelinePlaceholder" class="placeholder-state">
                    <div class="icon">📊</div>
                    <h3>Timeline will appear here</h3>
                    <p>Configure dates and upload a CSV/XLSX to begin.</p>
                </div>
                <div id="timelineView" class="timeline-view hidden">
                    <div class="timeline-scroll-wrapper">
                        <div id="timelineGrid" class="timeline-grid">
                            <!-- Dynamically populated -->
                        </div>
                    </div>
                </div>
            </section>

            <section class="bottom-panels hidden" id="bottomPanels">
                <div class="glass-panel summary-panel">
                    <h2>Sprint Summary</h2>
                    <div id="summaryContent" class="summary-content"></div>
                </div>
                <div class="glass-panel legend-panel">
                    <h2>Holiday Legend</h2>
                    <div id="legendContent" class="legend-content"></div>
                </div>
            </section>
        </main>
    </div>

    <!-- Local libraries -->
    <script src="./lib/papaparse.min.js"></script>
    <script src="./lib/exceljs.min.js"></script>
    <script src="./lib/FileSaver.min.js"></script>
    <script src="./lib/Sortable.min.js"></script>
    <script src="./app.js?v=10" defer></script>
</body>
</html>
